name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veltrix_test
          POSTGRES_USER: veltrix
          POSTGRES_PASSWORD: veltrix
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U veltrix"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://veltrix:veltrix@localhost:5432/veltrix_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-a-real-secret-000000000000
          JWT_REFRESH_SECRET: ci-test-refresh-not-a-real-secret-0000000
          ENCRYPTION_KEY: ci-test-encryption-not-a-real-secret-00000
