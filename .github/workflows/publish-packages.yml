name: Publish Packages

# Publishes the workspace's public packages when a GitHub Release is published.
# Build-and-publish only — no deployment. Each job no-ops unless the matching
# token secret is configured, so forks are unaffected.
#
#   npm packages (packages/*, e.g. @veltrix/ui, @veltrix/sdk)  -> needs NPM_TOKEN
#   Python SDK   (packages/sdk-python -> veltrix_sdk)          -> needs PYPI_API_TOKEN

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — require NPM_TOKEN
        id: guard
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.enabled == 'true'
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install & build
        if: steps.guard.outputs.enabled == 'true'
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build

      - name: Publish (skips private + already-published versions)
        if: steps.guard.outputs.enabled == 'true'
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — require PYPI_API_TOKEN and package dir
        id: guard
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$PYPI_API_TOKEN" ] || [ ! -d packages/sdk-python ]; then
            echo "PYPI_API_TOKEN not set or packages/sdk-python missing — skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.enabled == 'true'
        with:
          python-version: "3.11"

      - name: Build & publish
        if: steps.guard.outputs.enabled == 'true'
        working-directory: packages/sdk-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine upload dist/*
