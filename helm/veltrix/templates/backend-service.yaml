apiVersion: v1
kind: Service
metadata:
  name: {{ include "veltrix.backend.fullname" . }}
  labels:
    {{- include "veltrix.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    {{- include "veltrix.backend.selectorLabels" . | nindent 4 }}
