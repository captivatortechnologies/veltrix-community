apiVersion: v1
kind: Secret
metadata:
  name: {{ include "veltrix.backend.fullname" . }}-secrets
  labels:
    {{- include "veltrix.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "veltrix.databaseUrl" . | quote }}
  jwt-secret: {{ .Values.backend.secrets.jwtSecret | default "change-this-in-production" | quote }}
  cookie-secret: {{ .Values.backend.secrets.cookieSecret | default "change-this-cookie-secret" | quote }}
