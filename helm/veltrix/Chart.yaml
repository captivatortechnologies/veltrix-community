apiVersion: v2
name: veltrix
description: Veltrix - Open-source Security-as-Code Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
maintainers:
  - name: Veltrix Community
    url: https://github.com/veltrix
keywords:
  - security
  - security-as-code
  - pipeline
  - siem
  - configuration-management
# Background jobs run on BullMQ (Redis) — there is no message-broker dependency.
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
