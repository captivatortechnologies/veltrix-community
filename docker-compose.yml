# Veltrix Community Edition — single-server development / self-host stack.
# Four services only: postgres, redis, backend, frontend. No message broker —
# pipeline jobs run on BullMQ (Redis). Copy .env.example to .env first.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veltrix
      POSTGRES_USER: veltrix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-veltrix}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veltrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://veltrix:${POSTGRES_PASSWORD:-veltrix}@db:5432/veltrix
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  db_data:
  redis_data:
